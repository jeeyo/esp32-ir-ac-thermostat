esphome:
  name: ac-remote
  friendly_name: "AC Remote"
  platformio_options:
    board_build.f_cpu: 240000000L

esp32:
  board: m5stick-c
  framework:
    type: arduino

# --- External Components ---
external_components:
  - source: github://makerwolf/esphome-axp192@fd1d281
    components: [axp192]
  - source:
      type: local
      path: components

# --- Network ---
# WiFi credentials are intentionally not in this file. Configure WiFi via the
# fallback AP + captive portal on first boot, or extend this YAML with your
# own secrets. See README § "Adding Your Secrets".
wifi:
  ap:
    ssid: "AC-Remote-Fallback"
    password: "fallback123"

captive_portal:

api:

ota:
  - platform: esphome

logger:
  level: DEBUG

# --- I2C (shared bus for AXP192 PMU + ENV III HAT sensors) ---
i2c:
  sda: GPIO21
  scl: GPIO22

# --- SPI + Display ---
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

font:
  - file: "fonts/roboto.ttf"
    id: font_medium
    size: 16
  - file: "fonts/roboto.ttf"
    id: font_small
    size: 12
  - file: "fonts/roboto.ttf"
    id: font_large
    size: 24

color:
  - id: color_white
    white: 100%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
  - id: color_yellow
    red: 100%
    green: 100%
    blue: 0%
  - id: color_cyan
    red: 0%
    green: 100%
    blue: 100%
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%

display:
  - platform: st7789v
    id: main_display
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    model: "TTGO TDisplay 135x240"
    rotation: 270
    update_interval: 1s
    lambda: |-
      auto width = it.get_width();
      auto height = it.get_height();

      // Background
      it.fill(id(color_bg));

      // Current mode
      std::string mode_str;
      if (id(current_mode) == 0) {
        mode_str = "NORMAL";
      } else if (id(current_mode) == 1) {
        mode_str = "IR LEARN";
      } else if (id(current_mode) == 2) {
        mode_str = "CALIBRATE";
      }
      it.printf(width / 2, 5, id(font_small), id(color_cyan), TextAlign::TOP_CENTER, "%s", mode_str.c_str());

      // AC state
      bool ac_on = id(ac_power_switch).state;
      auto state_color = ac_on ? id(color_green) : id(color_red);
      it.printf(width / 2, 30, id(font_large), state_color, TextAlign::TOP_CENTER, "AC %s", ac_on ? "ON" : "OFF");

      // Beep confirmation
      if (id(beep_confirmed).state) {
        it.printf(width / 2, 60, id(font_small), id(color_green), TextAlign::TOP_CENTER, "Confirmed");
      } else {
        it.printf(width / 2, 60, id(font_small), id(color_yellow), TextAlign::TOP_CENTER, "Unconfirmed");
      }

      // Last action
      it.printf(width / 2, 80, id(font_small), id(color_white), TextAlign::TOP_CENTER, "%s", id(last_action_text).state.c_str());

      // Thermostat target + action
      {
        auto tstat_mode   = id(ac_thermostat).mode;
        auto tstat_action = id(ac_thermostat).action;
        float target = id(ac_thermostat).target_temperature;
        const char* mode_lbl = (tstat_mode == climate::CLIMATE_MODE_COOL) ? "COOL" :
                               (tstat_mode == climate::CLIMATE_MODE_OFF)  ? "T-OFF" : "---";
        const char* act_lbl  = (tstat_action == climate::CLIMATE_ACTION_COOLING) ? "cooling" :
                               (tstat_action == climate::CLIMATE_ACTION_IDLE)    ? "idle" : "off";
        it.printf(width / 2, 95, id(font_small), id(color_cyan), TextAlign::TOP_CENTER,
                  "%s  set %.1f\xc2\xb0""C  [%s]", mode_lbl, target, act_lbl);
      }

      // Command failed indicator
      if (id(command_failed).state) {
        it.printf(width / 2, 112, id(font_small), id(color_red), TextAlign::TOP_CENTER, "COMMAND FAILED");
      }

      // ENV III: temperature and humidity (bottom line)
      if (!isnan(id(env_temperature).state) && !isnan(id(env_humidity).state)) {
        it.printf(width / 2, 125, id(font_small), id(color_white), TextAlign::TOP_CENTER,
                  "%.1f\xc2\xb0""C  %.0f%%", id(env_temperature).state, id(env_humidity).state);
      }

# --- I2S Audio (PDM Microphone SPM1423) ---
i2s_audio:
  - id: i2s_mic
    i2s_lrclk_pin: GPIO0
    i2s_bclk_pin:
      number: GPIO0  # PDM uses CLK on LRCLK pin; BCLK unused but required by schema
      allow_other_uses: true

microphone:
  - platform: i2s_audio
    id: pdm_mic
    adc_type: external
    i2s_audio_id: i2s_mic
    i2s_din_pin: GPIO34
    pdm: true
    bits_per_sample: 16bit
    channel: left

# --- Beep Detector Custom Component ---
beep_detector:
  id: beep_det
  microphone_id: pdm_mic
  target_frequency: 4000.0
  frequency_tolerance: 200.0
  amplitude_min: 500.0
  amplitude_max: 5000.0
  min_duration_ms: 50
  max_duration_ms: 500
  sample_rate: 16000
  cooldown_ms: 5000
  on_beep_detected:
    - lambda: |-
        if (id(beep_det).is_self_triggered()) {
          // Our own command was confirmed
          ESP_LOGI("beep", "Self-triggered beep confirmed");
        } else {
          // External remote used — toggle state
          ESP_LOGI("beep", "External beep detected — toggling state");
          id(ac_power_switch).toggle();
          id(last_action_text).publish_state("External remote detected");
        }

# --- IR Transmitter (M5Stack IR Unit TX — Grove pin 1, GPIO32) ---
remote_transmitter:
  pin: GPIO32
  carrier_duty_percent: 50%

# --- IR Receiver (M5Stack IR Unit RX — Grove pin 2, GPIO33) ---
remote_receiver:
  id: ir_receiver
  pin:
    number: GPIO33
    inverted: true
    mode:
      input: true
  dump:
    - raw
    - pronto
  tolerance: 25%
  buffer_size: 10000b
  timeout: 50ms
  idle: 10ms

# --- Globals ---
globals:
  - id: current_mode
    type: int
    initial_value: "0"   # 0=normal, 1=ir_learn, 2=calibrate
  - id: retry_count
    type: int
    initial_value: "0"
  - id: waiting_for_beep
    type: bool
    initial_value: "false"

# --- Template Switch: AC Power ---
switch:
  - platform: template
    name: "AC Power"
    id: ac_power_switch
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: send_ac_on
    turn_off_action:
      - script.execute: send_ac_off

# --- Climate: Thermostat ---
climate:
  - platform: thermostat
    name: "AC Thermostat"
    id: ac_thermostat
    sensor: env_temperature
    min_cooling_off_time: 300s
    min_cooling_run_time: 180s
    min_idle_time: 300s
    cool_deadband: 0.5
    cool_overrun: 0.5
    visual:
      min_temperature: 18 °C
      max_temperature: 30 °C
      temperature_step: 0.5 °C
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_high: 24 °C
        mode: "OFF"
    cool_action:
      - script.execute: send_ac_on
    idle_action:
      - script.execute: send_ac_off
    off_mode:
      - script.execute: send_ac_off
    cool_mode:
      - logger.log: "Thermostat: entering COOL mode"

# --- Number: Thermostat tuning (runtime-adjustable hysteresis) ---
number:
  - platform: template
    name: "Cool Deadband"
    id: cool_deadband_num
    min_value: 0.1
    max_value: 2.0
    step: 0.05
    initial_value: 0.5
    unit_of_measurement: "°C"
    optimistic: true
    restore_value: true
    set_action:
      - lambda: 'id(ac_thermostat).set_cool_deadband(x);'

  - platform: template
    name: "Cool Overrun"
    id: cool_overrun_num
    min_value: 0.1
    max_value: 2.0
    step: 0.05
    initial_value: 0.5
    unit_of_measurement: "°C"
    optimistic: true
    restore_value: true
    set_action:
      - lambda: 'id(ac_thermostat).set_cool_overrun(x);'

# --- Button: manual state re-sync (flips switch state without sending IR) ---
button:
  - platform: template
    name: "Re-sync AC State"
    id: resync_ac_state
    on_press:
      - lambda: 'id(ac_power_switch).publish_state(!id(ac_power_switch).state);'
      - text_sensor.template.publish:
          id: last_action_text
          state: "State re-synced (no IR sent)"
      - logger.log: "AC state manually toggled for re-sync (no IR sent)"

# --- Binary Sensors ---
binary_sensor:
  # Beep confirmation
  - platform: template
    name: "AC Beep Confirmed"
    id: beep_confirmed
    device_class: sound

  # Command failed
  - platform: template
    name: "AC Command Failed"
    id: command_failed
    device_class: problem
    on_press:
      - climate.control:
          id: ac_thermostat
          mode: "OFF"
      - text_sensor.template.publish:
          id: last_action_text
          state: "Thermostat disabled — IR failure"

  # Button A (GPIO37) — Toggle AC / Long press: Calibrate
  - platform: gpio
    pin:
      number: GPIO37
      inverted: true
      mode:
        input: true
        pullup: true
    id: button_a
    name: "Button A"
    internal: true
    on_click:
      min_length: 50ms
      max_length: 1000ms
      then:
        - if:
            condition:
              lambda: 'return id(current_mode) == 0;'
            then:
              - switch.toggle: ac_power_switch
    on_multi_click:
      - timing:
          - ON for at least 3s
        then:
          - script.execute: start_calibration

  # Button B (GPIO39) — IR Learn mode
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
        pullup: true
    id: button_b
    name: "Button B"
    internal: true
    on_click:
      min_length: 50ms
      max_length: 1000ms
      then:
        - script.execute: toggle_ir_learn

# --- Text Sensors ---
text_sensor:
  - platform: template
    name: "Last Action"
    id: last_action_text

# --- Sensors (calibration results) ---
sensor:
  - platform: template
    name: "Beep Frequency"
    id: beep_frequency_sensor
    unit_of_measurement: "Hz"
    accuracy_decimals: 0

  - platform: template
    name: "Beep Amplitude"
    id: beep_amplitude_sensor
    accuracy_decimals: 0

  - platform: sht3xd
    temperature:
      name: "Temperature"
      id: env_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1
    humidity:
      name: "Humidity"
      id: env_humidity
      unit_of_measurement: "%"
      accuracy_decimals: 1
    address: 0x44
    update_interval: 15s

  - platform: qmp6988
    pressure:
      name: "Pressure"
      id: env_pressure
      unit_of_measurement: "hPa"
      accuracy_decimals: 1
    address: 0x70
    update_interval: 60s

  # AXP192 power management (M5StickC-Plus): sets LDO voltages for the LCD
  # backlight, exposes battery telemetry. Must be present or the display
  # backlight stays off.
  - platform: axp192
    id: pmu
    model: M5STICKC
    address: 0x34
    update_interval: 60s
    battery_level:
      name: "Battery Level"

# --- Scripts ---
script:
  # Send AC ON with retry logic
  - id: send_ac_on
    mode: restart
    then:
      - globals.set:
          id: retry_count
          value: "0"
      - binary_sensor.template.publish:
          id: beep_confirmed
          state: false
      - binary_sensor.template.publish:
          id: command_failed
          state: false
      - text_sensor.template.publish:
          id: last_action_text
          state: "Sending ON..."
      - script.execute: send_ac_on_attempt

  - id: send_ac_on_attempt
    mode: restart
    then:
      - lambda: |-
          id(retry_count) += 1;
          ESP_LOGI("ac", "AC ON attempt %d/3", id(retry_count));
      # Send IR ON code
      # Replace with your learned AC IR code
      - remote_transmitter.transmit_raw:
          code: [
            # Placeholder — replace with learned ON code
            # Example NEC-like pattern for testing:
            9000, -4500,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -39000
          ]
          carrier_frequency: 38000Hz
      # Set self-triggered flag and listen for beep
      - lambda: 'id(beep_det).set_self_triggered(true);'
      - globals.set:
          id: waiting_for_beep
          value: "true"
      - text_sensor.template.publish:
          id: last_action_text
          state: !lambda '"ON attempt " + to_string(id(retry_count)) + "/3 — listening..."'
      # Wait for beep (5s window)
      - delay: 5s
      - lambda: 'id(beep_det).set_self_triggered(false);'
      - globals.set:
          id: waiting_for_beep
          value: "false"
      # Check if beep was detected
      - if:
          condition:
            binary_sensor.is_on: beep_confirmed
          then:
            - switch.template.publish:
                id: ac_power_switch
                state: true
            - text_sensor.template.publish:
                id: last_action_text
                state: !lambda '"ON confirmed (attempt " + to_string(id(retry_count)) + ")"'
          else:
            - if:
                condition:
                  lambda: 'return id(retry_count) < 3;'
                then:
                  - text_sensor.template.publish:
                      id: last_action_text
                      state: !lambda '"No beep — retrying (" + to_string(id(retry_count)) + "/3)"'
                  - delay: 1s
                  - script.execute: send_ac_on_attempt
                else:
                  - text_sensor.template.publish:
                      id: last_action_text
                      state: "ON FAILED after 3 attempts"
                  - binary_sensor.template.publish:
                      id: command_failed
                      state: true
                  - globals.set:
                      id: retry_count
                      value: "0"

  # Send AC OFF with retry logic
  - id: send_ac_off
    mode: restart
    then:
      - globals.set:
          id: retry_count
          value: "0"
      - binary_sensor.template.publish:
          id: beep_confirmed
          state: false
      - binary_sensor.template.publish:
          id: command_failed
          state: false
      - text_sensor.template.publish:
          id: last_action_text
          state: "Sending OFF..."
      - script.execute: send_ac_off_attempt

  - id: send_ac_off_attempt
    mode: restart
    then:
      - lambda: |-
          id(retry_count) += 1;
          ESP_LOGI("ac", "AC OFF attempt %d/3", id(retry_count));
      # Send IR OFF code
      # Replace with your learned AC OFF IR code
      - remote_transmitter.transmit_raw:
          code: [
            # Placeholder — replace with learned OFF code
            9000, -4500,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -1690, 560, -560, 560, -560, 560, -560,
            560, -560, 560, -560, 560, -560, 560, -560,
            560, -560, 560, -1690, 560, -1690, 560, -1690,
            560, -1690, 560, -1690, 560, -1690, 560, -1690,
            560, -39000
          ]
          carrier_frequency: 38000Hz
      - lambda: 'id(beep_det).set_self_triggered(true);'
      - globals.set:
          id: waiting_for_beep
          value: "true"
      - text_sensor.template.publish:
          id: last_action_text
          state: !lambda '"OFF attempt " + to_string(id(retry_count)) + "/3 — listening..."'
      - delay: 5s
      - lambda: 'id(beep_det).set_self_triggered(false);'
      - globals.set:
          id: waiting_for_beep
          value: "false"
      - if:
          condition:
            binary_sensor.is_on: beep_confirmed
          then:
            - switch.template.publish:
                id: ac_power_switch
                state: false
            - text_sensor.template.publish:
                id: last_action_text
                state: !lambda '"OFF confirmed (attempt " + to_string(id(retry_count)) + ")"'
          else:
            - if:
                condition:
                  lambda: 'return id(retry_count) < 3;'
                then:
                  - text_sensor.template.publish:
                      id: last_action_text
                      state: !lambda '"No beep — retrying (" + to_string(id(retry_count)) + "/3)"'
                  - delay: 1s
                  - script.execute: send_ac_off_attempt
                else:
                  - text_sensor.template.publish:
                      id: last_action_text
                      state: "OFF FAILED after 3 attempts"
                  - binary_sensor.template.publish:
                      id: command_failed
                      state: true
                  - globals.set:
                      id: retry_count
                      value: "0"

  # IR Learn mode toggle
  - id: toggle_ir_learn
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == 1;'
          then:
            # Exit IR learn mode
            - globals.set:
                id: current_mode
                value: "0"
            - lambda: 'id(beep_det).set_paused(false);'
            - text_sensor.template.publish:
                id: last_action_text
                state: "IR Learn mode OFF"
            - logger.log: "IR Learn mode disabled"
          else:
            # Enter IR learn mode
            - globals.set:
                id: current_mode
                value: "1"
            - lambda: 'id(beep_det).set_paused(true);'
            - text_sensor.template.publish:
                id: last_action_text
                state: "IR Learn mode ON — point remote"
            - logger.log:
                level: INFO
                format: "IR Learn mode enabled. Point your remote at the M5Stack IR Unit and press buttons. Watch logs for raw codes."

  # Beep calibration
  - id: start_calibration
    mode: restart
    then:
      - globals.set:
          id: current_mode
          value: "2"
      - lambda: 'id(beep_det).set_paused(true);'
      - text_sensor.template.publish:
          id: last_action_text
          state: "Calibrating... trigger AC beep"
      - lambda: 'id(beep_det).start_calibration();'
      # Wait for calibration window
      - delay: 10s
      - lambda: |-
          auto result = id(beep_det).finish_calibration();
          id(beep_frequency_sensor).publish_state(result.frequency);
          id(beep_amplitude_sensor).publish_state(result.amplitude);

          // Suggest amplitude window (±30%)
          float amp_min = result.amplitude * 0.7f;
          float amp_max = result.amplitude * 1.3f;
          ESP_LOGI("calibration", "Peak frequency: %.0f Hz", result.frequency);
          ESP_LOGI("calibration", "Peak amplitude: %.0f", result.amplitude);
          ESP_LOGI("calibration", "Suggested amplitude_min: %.0f", amp_min);
          ESP_LOGI("calibration", "Suggested amplitude_max: %.0f", amp_max);
      - globals.set:
          id: current_mode
          value: "0"
      - lambda: 'id(beep_det).set_paused(false);'
      - text_sensor.template.publish:
          id: last_action_text
          state: "Calibration done — check logs"
