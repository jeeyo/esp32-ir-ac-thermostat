name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: esphome/workflows/.github/workflows/build.yml@main
    with:
      files: ac-remote.yaml
      esphome-version: latest
      release-version: ${{ github.ref_name }}
      release-summary: "ESP32 IR Remote — Smart AC controller with beep confirmation and thermostat"
      release-url: https://github.com/jeeyo/esp32-ir-remote
      combined-name: ac-remote

  upload:
    needs: build
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@main
    permissions:
      contents: write
    with:
      version: ${{ needs.build.outputs.version }}
